version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - TZ=Asia/Ho_Chi_Minh

      # domain
      - N8N_HOST=www.globaladvs.com
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://www.globaladvs.com/

      # security (QUAN TRỌNG)
      - N8N_SECURE_COOKIE=true

      # auth (khuyến nghị bật)
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin@123

      # database
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8npassword

      # performance
      - NODE_OPTIONS=--max-old-space-size=512

    volumes:
      - ./data/n8n:/home/node/.n8n

    depends_on:
      - postgres

    networks:
      - n8n-network

  postgres:
    image: postgres:15
    container_name: n8n-postgres
    restart: always
    ports:
      - "5432:5432"

    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=strongpassword
      - POSTGRES_DB=n8n

    volumes:
      - ./data/postgres:/var/lib/postgresql/data

    networks:
      - n8n-network

networks:
  n8n-network: